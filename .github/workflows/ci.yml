name: CI

# Roda em todo Pull Request e em push direto para a main.
on:
  pull_request:
  push:
    branches: [main]

# Cancela runs superados do mesmo ref (ex.: pushes seguidos no mesmo PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Sem necessidade de escrita — apenas ler o código.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Fixa a mesma versão usada localmente (reprodutibilidade do bun.lock).
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Gates sequenciais (fail-fast): os mais baratos e determinísticos primeiro.
      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      # T9 — gate de cobertura: test:coverage roda os unit tests E aplica os
      # thresholds definidos em vitest.config.ts (falha o job se a cobertura da
      # lógica pura cair abaixo do piso). O resumo textual vai para o painel do
      # PR/run via $GITHUB_STEP_SUMMARY.
      - name: Unit tests + cobertura (gate)
        run: |
          set -o pipefail
          bun run test:coverage 2>&1 | tee coverage-output.txt

      - name: Publicar resumo de cobertura no PR
        if: always()
        run: |
          {
            echo "## Cobertura (lógica de negócio pura — T9)"
            echo '```'
            sed -n '/Coverage report/,/^Lines/p' coverage-output.txt || true
            echo '```'
            echo "_Regras de negócio do servidor (RPCs/RLS/triggers) são cobertas pelos jobs \`db-tests\` e \`e2e\`._"
          } >> "$GITHUB_STEP_SUMMARY"

  db-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Fixa a mesma versão usada localmente (reprodutibilidade do bun.lock).
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: "2.109.1"

      - name: Start Supabase (subconjunto de serviços)
        run: |
          supabase start --exclude analytics,edge-runtime,functions,imgproxy,inbucket,meta,realtime,storage,studio,vector

      - name: Exportar env do Supabase local
        run: |
          # `supabase status -o env` emite valores entre aspas (estilo dotenv); o
          # $GITHUB_ENV trata as aspas como parte do valor, então removemos com sed
          # antes de exportar (senão a URL vira `"http://..."` e o fetch quebra).
          supabase status -o env \
            --override-name api.url=VITE_SUPABASE_URL \
            --override-name auth.anon_key=VITE_SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SELF_SUPABASE_SERVICE_ROLE_KEY \
            | sed -E 's/="(.*)"$/=\1/' >> "$GITHUB_ENV"

      - name: DB tests
        run: bun run test:db

      - name: Stop Supabase
        if: always()
        run: supabase stop

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Fixa a mesma versão usada localmente (reprodutibilidade do bun.lock).
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: "2.109.1"

      - name: Start Supabase (subconjunto de serviços)
        run: |
          supabase start --exclude analytics,edge-runtime,functions,imgproxy,inbucket,meta,realtime,storage,studio,vector

      - name: Aplicar migrations + seed
        run: supabase db reset

      - name: Exportar env do Supabase local
        run: |
          # `supabase status -o env` emite valores entre aspas (estilo dotenv); o
          # $GITHUB_ENV trata as aspas como parte do valor, então removemos com sed
          # antes de exportar (senão a URL vira `"http://..."` e o fetch quebra).
          # Estas mesmas vars precisam estar no ambiente quando o Playwright sobe
          # o `vite dev` (webServer), pois o app lê VITE_* em tempo de build/dev.
          supabase status -o env \
            --override-name api.url=VITE_SUPABASE_URL \
            --override-name auth.anon_key=VITE_SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SELF_SUPABASE_SERVICE_ROLE_KEY \
            | sed -E 's/="(.*)"$/=\1/' >> "$GITHUB_ENV"

      - name: Install Playwright browsers (chromium)
        run: bunx playwright install --with-deps chromium

      - name: E2E tests
        run: bun run test:e2e

      - name: Stop Supabase
        if: always()
        run: supabase stop
