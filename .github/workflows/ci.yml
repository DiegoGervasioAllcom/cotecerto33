name: CI

# Roda em todo Pull Request e em push direto para a main.
on:
  pull_request:
  push:
    branches: [main]

# Cancela runs superados do mesmo ref (ex.: pushes seguidos no mesmo PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Sem necessidade de escrita — apenas ler o código.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Fixa a mesma versão usada localmente (reprodutibilidade do bun.lock).
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Gates sequenciais (fail-fast): os mais baratos e determinísticos primeiro.
      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Unit tests
        run: bun run test:unit

# NOTA: os testes de banco (`bun run test:db`) exigem Supabase local via Docker e
# entram numa fase posterior (fase Docker/K), quando o CI tiver o banco de pé.
# Enquanto isso, rode-os localmente com `bun run test:db`.
