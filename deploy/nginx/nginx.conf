# CoteCerto — nginx.conf principal (K6-a / S5)
#
# Config global: define as zonas de rate limit usadas pelos vhosts em
# conf.d/*.conf. Mantida deliberadamente enxuta — o grosso das rotas fica
# em conf.d/app.conf.

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 25m;

    # --- Rate limiting (S5) ------------------------------------------------
    # Zonas por IP do cliente. "burst" permite picos curtos sem derrubar o
    # usuário na primeira requisição acima da média.
    #
    # - login/auth (Supabase GoTrue): rota mais sensível a força bruta.
    limit_req_zone $binary_remote_addr zone=auth_zone:10m   rate=5r/s;
    # - API REST/GraphQL/Storage/Functions do Supabase: uso normal do app.
    limit_req_zone $binary_remote_addr zone=api_zone:10m    rate=20r/s;
    # - app (páginas do front): mais permissivo.
    limit_req_zone $binary_remote_addr zone=app_zone:10m    rate=30r/s;
    limit_req_status 429;

    # Conexões simultâneas por IP (protege contra slowloris/DoS simples).
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;
    limit_conn_status 429;

    include /etc/nginx/conf.d/*.conf;
}
