# CoteCerto — vhost do app + Supabase (K6-a / S5)
#
# Substitua "PROXY_DOMAIN" (abaixo, nos caminhos ssl_certificate) pelo
# domínio real (o compose não interpola env vars dentro de arquivos de
# config estáticos do nginx) antes do primeiro deploy. Ver
# docs/RUNBOOK_DEPLOY.md.

# Redireciona HTTP -> HTTPS, exceto o desafio ACME do certbot (HTTP-01).
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Certificados emitidos pelo Let's Encrypt (certbot). Caminhos padrão do
    # certbot em modo webroot — ajustar o domínio real na primeira emissão.
    ssl_certificate     /etc/letsencrypt/live/PROXY_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/PROXY_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Cabeçalhos de segurança básicos.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    limit_conn conn_zone 20;

    # Resolver do Docker + proxy_pass via variável: evita que o nginx falhe
    # ao subir (ou no `nginx -t`) caso "kong"/"app" ainda não estejam
    # resolvíveis (ex.: ordem de start, ou teste de config fora da rede
    # Docker) — a resolução passa a ser sob demanda, por requisição.
    resolver 127.0.0.11 valid=30s;

    # --- Supabase Auth (login/signup/recovery) — zona mais restrita -------
    # Cobre POST /auth/v1/token (login), /auth/v1/signup, /auth/v1/recover,
    # /auth/v1/otp etc. — todas as rotas sensíveis a força bruta/credential
    # stuffing ficam sob esta zona (5 req/s por IP, burst curto).
    location /auth/v1/ {
        limit_req zone=auth_zone burst=10 nodelay;

        set $kong_upstream http://kong:8000;
        proxy_pass $kong_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Demais rotas do Supabase (REST/GraphQL/Realtime/Storage/Functions) -
    location ~ ^/(rest|graphql|realtime|storage|functions)/v1/ {
        limit_req zone=api_zone burst=40 nodelay;

        set $kong_upstream http://kong:8000;
        proxy_pass $kong_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Necessário para o upgrade de WebSocket do Realtime.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Supabase Studio (dashboard administrativo) ------------------------
    # Kong já aplica basic-auth (DASHBOARD_USERNAME/PASSWORD) nesta rota via
    # kong.yml. Recomendação: restringir também por IP (ip_allowlist) se o
    # Studio for exposto publicamente — ver comentário abaixo.
    location /studio/ {
        limit_req zone=api_zone burst=20 nodelay;
        # Descomente para restringir por IP (ex.: IP do escritório/VPN):
        # allow 203.0.113.10;
        # deny all;

        rewrite ^/studio/(.*)$ /$1 break;
        set $kong_upstream http://kong:8000;
        proxy_pass $kong_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- App (front) ---------------------------------------------------
    location / {
        limit_req zone=app_zone burst=60 nodelay;

        set $app_upstream http://app:3000;
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
